name: CI-CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  PYTHON_VERSION: "3.10"

jobs:

  tests-and-lint:
    name: Tests & qualité du code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linting
        run: |
          pip install flake8
          flake8 .

      - name: Lancer les tests
        run: |
          pip install pytest
          pytest -q

  deploy:
    name: Déploiement sur Hugging Face
    needs: tests-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer huggingface_hub
        run: pip install huggingface_hub

      - name: Déployer sur Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token $HF_TOKEN
          huggingface-cli upload ./ --repo jasonniba/projet_ml_deploiement --repo-type space